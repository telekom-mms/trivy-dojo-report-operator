defectDojoApiCredentials:
  createSecret: true
  apiKey: "YOUR_DEFECTDOJO_API_KEY"
  url: "YOUR_DEFECTDOJO_URL"
kubernetesClusterDomain: cluster.local
account:
  serviceAccount:
    annotations: {}
excludedNamespaces: []
operator:
  ports:
    - name: metrics
      port: 80
      protocol: TCP
      targetPort: metrics
  replicas: 1
  trivyDojoReportOperator:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 1000
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
    resources: {}
    affinity: {}
    nodeSelector: {}
    tolerations: []
    extraVolumeMounts: []
    extraVolumes: []
    env:
      defectDojoActive: "true"
      defectDojoAutoCreateContext: "true"
      defectDojoCloseOldFindings: "false"
      defectDojoCloseOldFindingsProductScope: "false"
      defectDojoDeduplicationOnEngagement: "true"
      defectDojoDoNotReactivate: "true"
      defectDojoEngagementName: engagement
      defectDojoEnvName: Development
      defectDojoEvalEngagementName: "false"
      defectDojoEvalEnvName: "false"
      defectDojoEvalProductName: "false"
      defectDojoEvalProductTypeName: "false"
      defectDojoEvalServiceName: "false"
      defectDojoEvalTags: "false"
      defectDojoEvalTestTitle: "false"
      defectDojoMinimumSeverity: Info
      defectDojoProductName: product
      defectDojoProductTypeName: Research and Development
      defectDojoPushToJira: "false"
      defectDojoServiceName: ""
      defectDojoTags: ""
      defectDojoTestTitle: Kubernetes
      defectDojoVerified: "false"
      defectDojoImportInterval: "0"
      reports: vulnerabilityreports
      http_proxy: ""
      https_proxy: ""
      logLevel: "INFO"
    image:
      repository: ghcr.io/telekom-mms/docker-trivy-dojo-operator
      tag: 0.11.1
    imagePullSecrets: []
    transformation:
      enabled: false
      interpreter: "bash"
      scanType: "Generic Findings Import"
      scriptFilename: "wrapper.sh"
      # scriptConfigMap: defines the ConfigMap that holds the transformation scripts.
      # create: when true, Helm creates and manages the ConfigMap; the name is
      #         derived automatically from the release. Only data is needed.
      # data:   map of filename -> script content; only used when create: true.
      # ref:    name of an existing externally-deployed ConfigMap to mount;
      #         only used when create: false.
      #
      # Example — reference an externally-deployed ConfigMap:
      # scriptConfigMap:
      #   ref: my-transform-scripts
      #
      # Example #2 — let Helm manage the ConfigMap:
      # scriptConfigMap:
      #   create: true
      #   data:
      #     wrapper.sh: |
      #       #!/bin/bash
      #       echo "$REPORT_JSON" | python3 /scripts/transform.py
      #     transform.py: |
      #       import sys, json
      #       print(sys.stdin.read())
      scriptConfigMap:
        ref: ""
        create: false
        data: {}
  type: ClusterIP
  podSecurityContext:
    runAsNonRoot: true
    fsGroupChangePolicy: Always
    fsGroup: 1000
# rbac.additionalRules: Additional RBAC rules appended to the base ClusterRole.
# These rules are strictly additive — the built-in base rules are always present
# and cannot be removed through this value.
#
# Each entry must be a valid RBAC rule object (apiGroups, resources, verbs).
# The rules below are the ones needed when the transformation feature is used
# to enrich reports with workload context (pods, deployments, jobs, …):
#
# rbac:
#   additionalRules:
#     - apiGroups: [""]
#       resources: [pods, secrets, replicationcontrollers]
#       verbs: [list, watch, get]
#     - apiGroups: [apps]
#       resources: [deployments, statefulsets, daemonsets, replicasets]
#       verbs: [get]
#     - apiGroups: [batch]
#       resources: [jobs, cronjobs]
#       verbs: [get]
rbac:
  additionalRules: []
